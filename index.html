<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background: black;
        }
        #ruffle-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<div id="ruffle-container"></div>

<script>
    window.addEventListener("DOMContentLoaded", () => {
        const ruffle = window.RufflePlayer.newest();
        if (!ruffle) {
            document.body.innerHTML = "<p style='color:red'>Ruffle failed to load.</p>";
            return;
        }
        const player = ruffle.createPlayer();
        player.style.width = "100%";
        player.style.height = "100%";
        document.getElementById("ruffle-container").appendChild(player);

        const swfUrl = "https://cdn.jsdelivr.net/gh/RobiFet/CMinterview@a4017231eca9f2173ad7ec0e63b01e4786b4ad6b/web/src/BiWrath.swf";
        player.load(swfUrl).catch(err => {
            console.error("Load failed:", err);
            document.body.innerHTML = `<p style='color:red'>Cannot load SWF: ${err.message}</p>`;
        });
    });
</script>
</body>
</html>
